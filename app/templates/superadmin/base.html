<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ t('superadmin_dashboard', lang) }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
      <div class="container-fluid">
        <a class="navbar-brand" href="/superadmin">Superadmin Panel</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/superadmin">Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/superadmin/shops">Shops</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/superadmin/users">Users</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/superadmin/translations">Translations</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
             <li class="nav-item"><a class="nav-link" href="?lang=en">ENG</a></li>
             <li class="nav-item"><a class="nav-link" href="?lang=ru">РУС</a></li>
             <li class="nav-item"><a class="nav-link" href="?lang=kz">ҚАЗ</a></li>
             <li class="nav-item">
                 <a class="nav-link text-white fw-bold" href="/admin/logout">Logout ({{ current_user.telegram_id }})</a>
             </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
