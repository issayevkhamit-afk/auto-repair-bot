<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RepairBot Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">SaaS Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="/admin/{{ shop.id }}">General Dashboard</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/{{ shop.id }}/labor">Labor Pricing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/{{ shop.id }}/parts">Parts Pricing</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/{{ shop.id }}/ai">AI Setup</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/admin/{{ shop.id }}/estimates">Estimates</a>
            </li>
          </ul>
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
             <li class="nav-item">
                 <a class="nav-link" href="?lang=en">ENG</a>
             </li>
             <li class="nav-item">
                 <a class="nav-link" href="?lang=ru">РУС</a>
             </li>
             <li class="nav-item">
                 <a class="nav-link" href="?lang=kz">ҚАЗ</a>
             </li>
             {% if current_user %}
             <li class="nav-item">
                 <a class="nav-link text-danger" href="/admin/logout">Logout</a>
             </li>
             {% endif %}
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
