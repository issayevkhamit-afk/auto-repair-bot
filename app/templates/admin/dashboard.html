{% extends "admin/base.html" %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h2>General Shop Settings ({{ shop.name }})</h2>
    </div>
    <div class="card-body">
        <form action="/admin/{{ shop.id }}/update-shop" method="post">
            <div class="mb-3">
                <label>Shop Name</label>
                <input type="text" name="name" class="form-control" value="{{ shop.name }}" required>
            </div>
            <div class="mb-3">
                <label>Currency</label>
                <input type="text" name="currency" class="form-control" value="{{ shop.currency }}" required>
            </div>
            <div class="mb-3">
                <label>Default Output Language</label>
                <select name="default_language" class="form-select">
                    <option value="ru" {% if shop.default_language == 'ru' %}selected{% endif %}>Русский (Russian)</option>
                    <option value="kz" {% if shop.default_language == 'kz' %}selected{% endif %}>Қазақша (Kazakh)</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Markup Percentage (e.g. 15 for 15%)</label>
                <input type="number" step="0.1" name="markup_percentage" class="form-control" value="{{ shop.markup_percentage }}">
            </div>
            <hr>
            <h4>Contact Info (for PDF)</h4>
            <div class="mb-3">
                <label>Phone</label>
                <input type="text" name="phone" class="form-control" value="{{ shop.phone or '' }}">
            </div>
            <div class="mb-3">
                <label>Address</label>
                <input type="text" name="address" class="form-control" value="{{ shop.address or '' }}">
            </div>
            <div class="mb-3">
                <label>City (For Market Prices Multiplier)</label>
                <input type="text" name="city" class="form-control" value="{{ shop.city or '' }}" placeholder="Astana, Almaty...">
            </div>
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
    </div>
</div>
{% endblock %}
